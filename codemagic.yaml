workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      java: 17
      flutter: stable
    scripts:
      - name: Build and Force Move
        script: |
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons
          cp build/app/outputs/flutter-apk/app-debug.apk ./qrchat-final.apk
    artifacts:
      - ./*.apk
    publishing:
      email:
        recipients:
          - rolex18k40@gmail.com
