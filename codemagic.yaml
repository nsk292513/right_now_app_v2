workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Clean and Get packages
        script: |
          flutter clean
          flutter pub get
      - name: Build Android APK
        script: |
          cd android
          ./gradlew clean
          cd ..
          flutter build apk --release --no-tree-shake-icons --build-number=84
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - rolex18k40@gmail.com
