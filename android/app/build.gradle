plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.nsk292513.right_now_app_v2"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    defaultConfig {
        applicationId "com.nsk292513.right_now_app_v2"
        minSdk 21
        targetSdk 34
        versionCode 112
        versionName "1.0.0"
    }

    buildTypes {
        release {
            // 서명 설정이 서버에 없어서 터지는 에러를 막기 위해 false로 고정합니다.
            shrinkResources false
            minifyEnabled false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    constraints {
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.0") {
            because("fix duplicate classes")
        }
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.0") {
            because("fix duplicate classes")
        }
    }
}
